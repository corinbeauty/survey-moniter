<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稽核監控中心 - 中清行館 V1.7.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .modal-active { opacity: 1; pointer-events: auto; }
        .modal-inactive { opacity: 0; pointer-events: none; }
        
        /* 極致緊湊佈局 (V1.7.2) */
        .compact-table th, .compact-table td { 
            padding: 0.25rem 0.15rem !important; 
            border: 1px solid #f1f5f9; 
            vertical-align: middle; 
            line-height: 1.1;
        }
        
        .q-col { 
            min-width: 40px; 
            max-width: 52px;
            text-align: center; 
            font-weight: 800; 
            font-size: 8px; 
            letter-spacing: -0.6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        @keyframes pulse-red-alert { 
            0% { background-color: #ef4444; transform: scale(1); } 
            50% { background-color: #dc2626; transform: scale(1.01); } 
            100% { background-color: #ef4444; transform: scale(1); } 
        }
        .alarm-banner { 
            animation: pulse-red-alert 1.5s infinite ease-in-out; 
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4); 
            border: 2px solid white;
        }

        /* 滾動條美化 */
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .print-compact { border-radius: 0 !important; box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; }
            .compact-table td { font-size: 7px !important; -webkit-print-color-adjust: exact; }
            .compact-table th { font-size: 7px !important; background: #f8fafc !important; -webkit-print-color-adjust: exact; }
            .status-tag { color: white !important; border: none !important; -webkit-print-color-adjust: exact; }
            @page { size: A2 landscape; margin: 0.3cm; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-1 md:p-1.5">

<!-- 即時警報顯示區 -->
<div id="alarmContainer" class="fixed top-2 left-1/2 -translate-x-1/2 z-[10001] w-full max-w-xl pointer-events-none no-print"></div>

<div id="adminApp" class="max-w-[2400px] mx-auto print-compact">
    <!-- 登入介面 -->
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md flex items-center justify-center z-[9999] no-print transition-all duration-500">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center border-t-8 border-blue-600">
            <h2 class="text-xl font-black mb-1 text-slate-800 italic uppercase tracking-tighter">管理主控台</h2>
            <p class="text-[9px] text-slate-400 mb-6 font-bold uppercase">中清行館監控站</p>
            <div class="relative mb-4">
                <input type="password" id="loginInput" placeholder="輸入管理密碼" class="w-full p-3 border-2 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 shadow-inner">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl active:scale-95 transition hover:bg-blue-700 shadow-lg mb-2">進入監控系統</button>
            <p id="loginStatus" class="text-[9px] text-slate-400 font-mono uppercase tracking-widest italic">Authenticating...</p>
        </div>
    </div>

    <header class="flex justify-between items-end mb-1.5 px-1 no-print">
        <div>
            <h1 class="text-lg font-black text-slate-900 uppercase leading-none">服務稽核報表 <span id="connTag" class="text-[8px] bg-slate-200 px-1 py-0.5 rounded ml-1 font-mono italic"></span></h1>
            <p class="text-slate-400 text-[8px] font-bold italic">V1.7.2 Real-time Monitoring Station</p>
        </div>
        <div class="flex gap-1.5">
            <button onclick="exportReport()" class="bg-white border px-2.5 py-0.5 rounded-lg font-black shadow-sm text-[10px] hover:bg-slate-50 transition">匯出報表</button>
            <button onclick="signOutAdmin()" class="bg-slate-100 px-2 py-0.5 rounded-lg font-bold text-slate-400 text-[9px] hover:text-red-400">登出</button>
        </div>
    </header>

    <!-- 篩選控制區 -->
    <section class="bg-white p-1.5 rounded-xl shadow-sm border mb-1.5 no-print grid grid-cols-2 md:grid-cols-5 gap-1.5 items-end">
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">開始日期</label><input type="date" id="filterStart" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-slate-50 border rounded text-[10px] font-bold"></div>
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">結束日期</label><input type="date" id="filterEnd" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-slate-50 border rounded text-[10px] font-bold"></div>
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">篩選師傅</label><select id="filterMasseur" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-slate-50 border rounded text-[10px] font-bold"><option value="all">所有師傅</option></select></div>
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">異常狀態篩選</label><select id="filterStatus" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-blue-50 border border-blue-100 rounded text-[10px] font-black text-blue-700">
            <option value="all">顯示全部數據</option>
            <option value="critical">僅看異常 (待處理)</option>
            <option value="resolved">僅看異常 (已處理)</option>
            <option value="normal">僅看正常數據</option>
        </select></div>
        <button onclick="resetFilters()" class="bg-slate-800 text-white font-black py-1 rounded text-[10px] hover:bg-slate-700">重置篩選</button>
    </section>

    <!-- 數據概覽 -->
    <div class="flex gap-1.5 mb-1.5 no-print">
        <div class="bg-white px-3 py-1 rounded-xl shadow-sm border flex flex-col justify-center min-w-[80px]">
            <p class="text-slate-400 text-[8px] font-bold uppercase leading-none mb-1">本期總量</p>
            <div class="flex items-center gap-2">
                <h3 id="statTotal" class="text-lg font-black italic text-blue-600 leading-none">0</h3>
                <div id="loadingSpin" class="animate-spin text-blue-600 text-[8px]">⌛</div>
            </div>
        </div>
        <div id="alarmCountBox" class="bg-white px-3 py-1 rounded-xl shadow-sm border-2 border-red-50 flex flex-col justify-center min-w-[80px]">
            <p class="text-slate-400 text-[8px] font-bold uppercase leading-none mb-1 text-red-400">異常待處置</p>
            <h3 id="activeAlarmNum" class="text-lg font-black italic text-red-500 leading-none">0</h3>
        </div>
        <div class="bg-white px-3 py-1 rounded-xl shadow-sm border flex-1 flex flex-col justify-center overflow-hidden">
            <p class="text-slate-400 text-[8px] font-bold uppercase leading-none mb-1">師傅表現統計 (已點評論★ / 意見回饋📝)</p>
            <div id="masseurStatsList" class="flex gap-1.5 overflow-x-auto custom-scroll pb-0.5 items-center">
                <span class="text-[9px] text-slate-300 italic">計算中...</span>
            </div>
        </div>
    </div>

    <!-- 數據表格 -->
    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1550px] compact-table">
                <thead>
                    <tr class="text-[7.5px] font-black text-slate-400 uppercase border-b bg-slate-50/50">
                        <th class="w-6 text-center">序</th>
                        <th class="w-16">系統/服務時間</th>
                        <th class="w-10 text-center">師傅</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q1 介紹</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q2 力道</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q3 異味</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q4 時間</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q5 禮貌</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q6 觸碰</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q7 禁動</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q8 打卡</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q9 名片</th>
                        <th class="q-col text-red-700 bg-red-50/20">Q10 老點</th>
                        <th class="w-20">顧客資訊</th>
                        <th class="w-14 text-center">行銷反饋</th>
                        <th class="w-10 text-center">狀態</th>
                        <th class="min-w-[120px]">管理備註</th>
                        <th class="w-10 no-print text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody" class="text-[8.5px] divide-y"></tbody>
            </table>
        </div>
    </div>

    <!-- 詳情 Modal -->
    <div id="detailModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm modal-inactive z-[10000] flex items-center justify-center p-4 transition-all duration-300 no-print">
        <div class="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-white">
                <h3 class="text-lg font-black italic text-slate-800"><span id="modalId" class="bg-blue-600 text-white px-2 py-0.5 rounded text-xs mr-2 not-italic">00</span>稽核數據處置</h3>
                <button onclick="closeModal()" class="w-8 h-8 bg-slate-100 rounded-full font-bold">✕</button>
            </div>
            <div id="modalContent" class="p-5 space-y-2.5 overflow-y-auto flex-1"></div>
            <div class="p-5 bg-slate-50 border-t space-y-2.5">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">管理者處置說明</p>
                <textarea id="adminRemarkInput" rows="2" placeholder="請填寫處理情況..." class="w-full p-3 border rounded-xl text-sm outline-none bg-white"></textarea>
                <div class="flex gap-2">
                    <button id="resolveBtn" class="flex-1 bg-blue-600 text-white font-black py-3 rounded-xl shadow-md active:scale-95 transition hover:bg-blue-700">標記處理完成</button>
                    <button onclick="closeModal()" class="px-4 bg-slate-200 text-slate-600 font-bold rounded-xl">取消</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCuytMbR0wfPk0vChxqI66Zci0uJtGiizE",
        authDomain: "survey-c3aa5.firebaseapp.com",
        projectId: "survey-c3aa5",
        storageBucket: "survey-c3aa5.firebasestorage.app",
        messagingSenderId: "874594469122",
        appId: "1:874594469122:web:2b2c1208b20d2095b9ae1b",
        measurementId: "G-B5T1318ZR4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const collectionPath = ['apps', 'zhongqing-v1', 'surveys'];

    let rawData = [];
    let currentDocId = null;
    let syncStarted = false;
    let revealedIds = new Set(); // 追蹤哪些項目的明碼被開啟

    // --- 隱碼邏輯工具 ---
    const maskName = (name) => {
        if (!name) return '-';
        if (name.length <= 1) return name;
        if (name.length === 2) return name.charAt(0) + '*';
        return name.charAt(0) + '*'.repeat(name.length - 2) + name.charAt(name.length - 1);
    };

    const maskPhone = (phone) => {
        if (!phone) return '';
        const p = String(phone).replace(/\s/g, '');
        if (p.length < 7) return p;
        // 修改為更標準的中間隱碼：0912****678
        return p.substring(0, 3) + '****' + p.substring(p.length - 3);
    };

    const posKeywords = ["主動介紹詢問", "主動詢問調整", "沒有異味", "服務很好", "良好有禮", "專業得體", "完全沒有", "熱情主動", "一定老點", "Definitely", "Proactive", "Excellent", "Polite", "Professional", "None", "No odor", "積極的", "丁寧", "適切", "なかった", "必ず指名", "적극 안내", "적극 확인", "만족", "정중함", "전문적", "꼭 지명"];
    const neuKeywords = ["後來才問", "被動回應", "稍微有點", "普通尚可", "有點尷尬", "有點危險", "非常被動", "要了才給", "再試試看", "Maybe", "Later", "Passive", "Average", "Awkward", "Risky", "Requested", "後で", "受動的", "少し", "普通", "氣まずい", "稍微有點危險", "有些危難", "また試す", "求めたら", "나중에", "수動的", "약간", "보통", "당황함", "위험", "다시 시度", "요청 시"];
    const negKeywords = ["完全沒問", "完全不問", "味道很重", "感覺很差", "言語不當", "非常危險", "完全沒說", "沒有給名片", "絕對不會", "No", "Strong", "Poor", "Impolite", "Dangerous", "Never", "非常に", "悪い", "失礼", "不快", "非常に危險", "しない", "심함", "불만", "무례", "불쾌", "매우 위험", "안 함"];

    const labels = { q1: "Q1. 開始介紹", q2: "Q2. 力道調整", q3: "Q3. 異味/煙味", q4: "Q4. 時間掌握", q5: "Q5. 服務禮貌", q6: "Q6. 肢體觸碰", q7: "Q7. 禁止動作", q8: "Q8. 打卡推廣", q9: "Q9. 提供名片", q10: "Q10. 老點意願" };

    function setDateRangeDefaults() {
        const today = new Date(); const yesterday = new Date(); yesterday.setDate(today.getDate() - 2);
        const toISO = (d) => d.toISOString().split('T')[0];
        document.getElementById('filterStart').value = toISO(yesterday); document.getElementById('filterEnd').value = toISO(today);
    }

    window.exportReport = () => {
        const start = document.getElementById('filterStart').value;
        const end = document.getElementById('filterEnd').value;
        document.title = `中清店服務稽核_${start}_${end}`;
        window.print();
    };

    window.handleLogin = async () => { 
        const pass = document.getElementById('loginInput').value;
        if(pass === 'admin888') { 
            try {
                await setPersistence(auth, browserLocalPersistence);
                sessionStorage.setItem('adminVerified', 'true');
                document.getElementById('loginStatus').innerText = "驗證成功，同步數據中..."; 
                document.getElementById('loginBtn').disabled = true;
                await initAuth(); 
                if (auth.currentUser) startSync();
            } catch (err) { alert("登入設定失敗"); }
        } else { alert("密碼錯誤"); }
    };

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
        } catch (e) { console.error("Auth Fail"); }
    };

    onAuthStateChanged(auth, user => { 
        const isVerified = sessionStorage.getItem('adminVerified') === 'true';
        if(user && isVerified) {
            document.getElementById('connTag').innerText = "LIVE";
            document.getElementById('connTag').className = "text-[8px] bg-green-100 text-green-600 px-1 py-0.5 rounded font-black";
            startSync();
        }
    });

    window.signOutAdmin = async () => {
        sessionStorage.removeItem('adminVerified');
        await signOut(auth);
        location.reload();
    };

    function startSync() {
        if (!auth.currentUser || sessionStorage.getItem('adminVerified') !== 'true' || syncStarted) return;
        syncStarted = true;
        onSnapshot(collection(db, ...collectionPath), (sn) => {
            rawData = sn.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateDropdown(); filterData();
            document.getElementById('loadingSpin').classList.add('hidden');
            const overlay = document.getElementById('loginOverlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 500);
            }
        }, (err) => {
            syncStarted = false; 
            document.getElementById('loginBtn').disabled = false;
        });
    }

    // 切換顯示/隱藏明碼
    window.toggleReveal = (id) => {
        if (revealedIds.has(id)) revealedIds.delete(id);
        else revealedIds.add(id);
        filterData(); // 重新渲染表格
    };

    window.filterData = () => {
        const startVal = document.getElementById('filterStart').value;
        const endVal = document.getElementById('filterEnd').value;
        const masVal = document.getElementById('filterMasseur').value;
        const statusVal = document.getElementById('filterStatus').value;

        let filtered = rawData.filter(d => {
            const targetDate = d.serviceDate || (d.createdAt ? new Date(d.createdAt.seconds * 1000).toISOString().split('T')[0] : null);
            if (!targetDate) return true; 
            const matchStart = startVal ? (targetDate >= startVal) : true;
            const matchEnd = endVal ? (targetDate <= endVal) : true;
            const matchMas = (masVal === 'all') ? true : (String(d.masseurId) === masVal);
            
            const isCritical = Object.values(d.ratings || {}).some(v => negKeywords.includes(v));
            const isResolved = d.adminStatus === 'resolved';
            let matchStatus = true;
            if (statusVal === 'critical') matchStatus = isCritical && !isResolved;
            else if (statusVal === 'resolved') matchStatus = isResolved;
            else if (statusVal === 'normal') matchStatus = !isCritical;

            return matchStart && matchEnd && matchMas && matchStatus;
        });

        filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        
        updateMasseurStats(filtered);
        updateAlarmUI(filtered); 
        renderTable(filtered);
    };

    function updateMasseurStats(data) {
        const stats = {};
        data.forEach(d => {
            const mid = d.masseurId || 'Unknown';
            if (!stats[mid]) stats[mid] = { reviews: 0, feedback: 0 };
            if (d.marketingAction === 'Reviewed') stats[mid].reviews++;
            if (d.suggestions && d.suggestions.trim() && d.suggestions !== "無。" && d.suggestions !== "無填寫建議。") {
                stats[mid].feedback++;
            }
        });

        const sortedStats = Object.entries(stats).sort((a, b) => (b[1].reviews + b[1].feedback) - (a[1].reviews + a[1].feedback));
        const listEl = document.getElementById('masseurStatsList');
        
        if (sortedStats.length === 0) {
            listEl.innerHTML = '<span class="text-[9px] text-slate-300 italic">目前無數據</span>';
            return;
        }

        listEl.innerHTML = sortedStats.map(([id, s]) => `
            <div class="flex items-center gap-1 bg-blue-50 border border-blue-100 px-2 py-0.5 rounded-full shrink-0">
                <span class="text-[9px] font-black text-blue-800 italic">#${id}</span>
                <span class="text-[10px] font-black text-amber-600 leading-none">${s.reviews}★</span>
                <span class="text-[10px] font-black text-blue-500 leading-none">${s.feedback}📝</span>
            </div>
        `).join('');
    }

    function updateAlarmUI(data) {
        const container = document.getElementById('alarmContainer');
        const pendingAlarms = data.filter(item => Object.values(item.ratings || {}).some(val => negKeywords.includes(val)) && item.adminStatus !== 'resolved');
        document.getElementById('activeAlarmNum').innerText = pendingAlarms.length;
        
        if (pendingAlarms.length > 0) {
            const latest = pendingAlarms[0];
            const isRevealed = revealedIds.has(latest.id);
            container.innerHTML = `
                <div class="m-2 pointer-events-auto">
                    <div class="alarm-banner text-white px-4 py-1.5 rounded-xl flex justify-between items-center shadow-lg">
                        <div class="flex items-center gap-2">
                            <span class="text-base">⚠️</span>
                            <div>
                                <p class="font-black text-[11px]">師傅 ${latest.masseurId} 稽核異常！</p>
                                <p class="text-[8px] opacity-90">${isRevealed ? latest.customerName : maskName(latest.customerName)} | ${latest.serviceDate || ''}</p>
                            </div>
                        </div>
                        <button onclick="window.showDetail('${latest.id}', '警報')" class="bg-white text-red-600 px-2 py-0.5 rounded-lg font-black text-[9px] shadow-sm">立即處理</button>
                    </div>
                </div>`;
        } else { container.innerHTML = ''; }
    }

    function renderTable(data) {
        document.getElementById('statTotal').innerText = data.length;
        document.getElementById('reportTableBody').innerHTML = data.map((d, i) => {
            const ts = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleString('zh-TW', { hour12: false, month:'numeric', day:'numeric', hour:'numeric', minute:'numeric' }) : 'Sync';
            const r = d.ratings || {};
            const isCritical = Object.values(r).some(v => negKeywords.includes(v));
            const isResolved = d.adminStatus === 'resolved';
            const isRevealed = revealedIds.has(d.id);
            
            let label = '正常', color = 'bg-green-600';
            if (isResolved) { label = '完成'; color = 'bg-blue-600'; }
            else if (isCritical) { label = '異常'; color = 'bg-red-600 animate-pulse'; }
            
            const getQStyle = (val) => {
                if (!val || val === '-') return 'text-slate-200';
                if (negKeywords.includes(val)) return 'text-red-700 bg-red-50 font-black';
                if (neuKeywords.includes(val)) return 'text-yellow-700 bg-yellow-50 font-bold';
                if (posKeywords.includes(val)) return 'text-green-700 bg-green-50 font-bold';
                return 'text-slate-600';
            };

            let mLabel = '<span class="text-slate-200">-</span>';
            if (d.marketingAction === 'Reviewed') mLabel = '<span class="text-amber-500 font-bold">★ 評論</span>';
            if (d.marketingAction === 'Dismissed') mLabel = '<span class="text-slate-300">下次</span>';

            // 確保 Tooltip 也不會洩漏資料
            const toolTipText = isRevealed ? `${d.customerName} | ${d.customerPhone}` : `${maskName(d.customerName)} | ${maskPhone(d.customerPhone)}`;

            return `<tr>
                <td class="text-center font-black text-slate-300">${i + 1}</td>
                <td class="font-mono text-[6.5px] text-slate-400">系:${ts}<br>服:${d.serviceDate || '-'}</td>
                <td class="text-center"><span class="bg-slate-800 text-white px-1 py-0.5 rounded text-[9px] font-black italic">${d.masseurId}</span></td>
                <td class="q-col ${getQStyle(r.q1)}">${r.q1 || '-'}</td>
                <td class="q-col ${getQStyle(r.q2)}">${r.q2 || '-'}</td>
                <td class="q-col ${getQStyle(r.q3)}">${r.q3 || '-'}</td>
                <td class="q-col ${getQStyle(r.q4)}">${r.q4 || '-'}</td>
                <td class="q-col ${getQStyle(r.q5)}">${r.q5 || '-'}</td>
                <td class="q-col ${getQStyle(r.q6)}">${r.q6 || '-'}</td>
                <td class="q-col ${getQStyle(r.q7)}">${r.q7 || '-'}</td>
                <td class="q-col ${getQStyle(r.q8)}">${r.q8 || '-'}</td>
                <td class="q-col ${getQStyle(r.q9)}">${r.q9 || '-'}</td>
                <td class="q-col ${getQStyle(r.q10)}">${r.q10 || '-'}</td>
                <td class="p-1" title="${toolTipText}">
                    <div class="flex items-center gap-1">
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-slate-700 leading-none truncate">${isRevealed ? d.customerName : maskName(d.customerName)}</p>
                            <p class="text-[7px] text-slate-400 font-normal leading-tight mt-0.5">${isRevealed ? d.customerPhone : maskPhone(d.customerPhone)}</p>
                        </div>
                        <button onclick="window.toggleReveal('${d.id}')" class="no-print bg-slate-100 hover:bg-slate-200 p-0.5 rounded shadow-sm text-[10px]" title="切換顯示/隱碼">${isRevealed ? '👁️‍🗨️' : '👁️'}</button>
                    </div>
                </td>
                <td class="text-center text-[7px]">${mLabel}</td>
                <td class="text-center"><span class="status-tag text-[6.5px] px-1 py-0.5 rounded-full font-black text-white ${color}">${label}</span></td>
                <td class="italic text-slate-500 truncate text-[7.5px]" title="${d.adminRemark || ''}">${d.adminRemark || '待處置...'}</td>
                <td class="no-print text-center"><button onclick="window.showDetail('${d.id}', ${i + 1})" class="bg-slate-100 text-slate-800 px-1.5 py-0.5 rounded text-[7.5px] font-black hover:bg-blue-600 hover:text-white">管理</button></td>
            </tr>`;
        }).join('');
    }

    function updateDropdown() {
        const ids = [...new Set(rawData.map(d => String(d.masseurId)))].sort((a,b) => parseInt(a)-parseInt(b));
        document.getElementById('filterMasseur').innerHTML = '<option value="all">所有師傅</option>' + ids.map(id => `<option value="${id}">${id}</option>`).join('');
    }

    document.getElementById('resolveBtn').onclick = async () => {
        if(!currentDocId) return;
        const btn = document.getElementById('resolveBtn'); btn.disabled = true;
        try {
            await updateDoc(doc(db, ...collectionPath, currentDocId), { adminStatus: 'resolved', adminRemark: document.getElementById('adminRemarkInput').value || "已處理。", handledAt: serverTimestamp() });
            closeModal();
        } catch (e) { alert("更新失敗"); } finally { btn.disabled = false; }
    };

    window.showDetail = (docId, seq) => {
        const item = rawData.find(d => d.id === docId); if(!item) return;
        currentDocId = docId; document.getElementById('modalId').innerText = seq;
        document.getElementById('adminRemarkInput').value = item.adminRemark || "";
        const r = item.ratings || {};
        const isRevealed = revealedIds.has(docId);
        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-50 p-3 rounded-xl border"><p class="text-[8px] text-slate-400 font-black mb-0.5">師傅 ID</p><p class="text-xl font-black text-blue-600">${item.masseurId}</p></div>
                <div class="bg-slate-50 p-3 rounded-xl border">
                    <div class="flex justify-between items-center mb-0.5">
                        <p class="text-[8px] text-slate-400 font-black uppercase">顧客資訊</p>
                        <button onclick="window.toggleReveal('${docId}'); window.showDetail('${docId}', '${seq}');" class="text-[10px]">${isRevealed ? '👁️‍🗨️' : '👁️'}</button>
                    </div>
                    <p class="text-lg font-bold">${isRevealed ? item.customerName : maskName(item.customerName)}</p>
                    <p class="text-[10px] text-slate-400">${isRevealed ? item.customerPhone : maskPhone(item.customerPhone)}</p>
                </div>
            </div>
            <div class="space-y-1 mt-2">
                ${Object.keys(labels).map(k => `
                    <div class="flex justify-between items-center px-3 py-1.5 border rounded-lg ${negKeywords.includes(r[k]) ? 'bg-red-50 border-red-200' : 'bg-white'}">
                        <span class="text-slate-500 font-bold text-[10px]">${labels[k]}</span>
                        <span class="font-black text-[10px] ${negKeywords.includes(r[k]) ? 'text-red-600' : 'text-blue-600'}">${r[k] || '-'}</span>
                    </div>
                `).join('')}
            </div>
            <div class="bg-amber-50 p-3 rounded-xl border border-amber-100 mt-2">
                <p class="text-[8px] font-black text-amber-600 mb-0.5">顧客建議原文</p>
                <p class="text-xs text-slate-700 italic leading-relaxed">"${item.suggestions || "無填寫建議。"}"</p>
            </div>`;
        document.getElementById('detailModal').classList.replace('modal-inactive', 'modal-active');
    };

    window.closeModal = () => { document.getElementById('detailModal').classList.replace('modal-active', 'modal-inactive'); currentDocId = null; };
    window.resetFilters = () => { setDateRangeDefaults(); document.getElementById('filterMasseur').value = 'all'; document.getElementById('filterStatus').value = 'all'; filterData(); };
    window.onload = () => { setDateRangeDefaults(); document.getElementById('loginInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); }); document.getElementById('loginInput').focus(); };
</script>
</body>
</html>
