<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稽核監控中心 - 中清行館 V1.7.7 (Connectivity Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        
        .modal-active { display: flex !important; opacity: 1; pointer-events: auto; }
        .modal-inactive { display: none !important; opacity: 0; pointer-events: none; }
        
        .compact-table th, .compact-table td { 
            padding: 0.25rem 0.15rem !important; 
            border: 1px solid #f1f5f9; 
            vertical-align: middle; 
            line-height: 1.1;
        }
        
        .q-col { 
            min-width: 40px; 
            max-width: 52px;
            text-align: center; 
            font-weight: 800; 
            font-size: 8px; 
            letter-spacing: -0.6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        @keyframes pulse-red-alert { 
            0% { background-color: #ef4444; transform: scale(1); } 
            50% { background-color: #dc2626; transform: scale(1.01); } 
            100% { background-color: #ef4444; transform: scale(1); } 
        }
        .alarm-banner { 
            animation: pulse-red-alert 1.5s infinite ease-in-out; 
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4); 
            border: 2px solid white;
        }

        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .print-compact { border-radius: 0 !important; box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; }
            @page { size: A2 landscape; margin: 0.3cm; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-1 md:p-1.5">

<!-- 即時通訊日誌 (本機測試極度重要) -->
<div id="debugLog" class="fixed bottom-2 right-2 z-[10005] bg-black/85 text-[10px] text-green-400 p-3 rounded-xl max-w-[280px] pointer-events-none no-print border border-green-900 hidden">
    <p class="font-black border-b border-green-900 mb-1 pb-1 uppercase">Connectivity Log</p>
    <div id="logContent" class="space-y-1"></div>
</div>

<div id="alarmContainer" class="fixed top-2 left-1/2 -translate-x-1/2 z-[10001] w-full max-w-xl pointer-events-none no-print"></div>

<div id="adminApp" class="max-w-[2400px] mx-auto print-compact">
    <!-- 登入介面 -->
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md flex items-center justify-center z-[10004] no-print transition-all duration-500">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center border-t-8 border-blue-600">
            <h2 class="text-xl font-black mb-1 text-slate-800 italic uppercase tracking-tighter">管理主控台</h2>
            <p class="text-[9px] text-slate-400 mb-6 font-bold uppercase">中清行館監控站 V1.7.7</p>
            <div class="relative mb-4">
                <input type="password" id="loginInput" placeholder="輸入管理密碼" class="w-full p-3 border-2 rounded-xl text-center text-lg font-bold outline-none focus:border-blue-500 shadow-inner">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl active:scale-95 transition hover:bg-blue-700 shadow-lg mb-2 cursor-pointer">進入監控系統</button>
            <p id="loginStatus" class="text-[9px] text-slate-400 font-mono uppercase tracking-widest italic">Authenticating...</p>
        </div>
    </div>

    <header class="flex justify-between items-end mb-1.5 px-1 no-print">
        <div>
            <h1 class="text-lg font-black text-slate-900 uppercase leading-none">服務稽核報表 <span id="connTag" class="text-[8px] bg-slate-200 px-1 py-0.5 rounded ml-1 font-mono italic"></span></h1>
            <p class="text-slate-400 text-[8px] font-bold italic">V1.7.7 Local Connectivity Optimization</p>
        </div>
        <div class="flex gap-1.5 items-center">
            <div id="lineStatusTag" class="bg-blue-50 text-blue-600 text-[8px] px-2 py-0.5 rounded border border-blue-200 font-black italic">LINE: STANDBY</div>
            <button onclick="exportReport()" class="bg-white border px-2.5 py-0.5 rounded-lg font-black shadow-sm text-[10px] hover:bg-slate-50 transition cursor-pointer">匯出報表</button>
            <button onclick="signOutAdmin()" class="bg-slate-100 px-2 py-0.5 rounded-lg font-bold text-slate-400 text-[9px] hover:text-red-400 cursor-pointer">登出</button>
        </div>
    </header>

    <section class="bg-white p-1.5 rounded-xl shadow-sm border mb-1.5 no-print grid grid-cols-2 md:grid-cols-5 gap-1.5 items-end">
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">開始日期</label><input type="date" id="filterStart" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-slate-50 border rounded text-[10px] font-bold"></div>
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">結束日期</label><input type="date" id="filterEnd" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-slate-50 border rounded text-[10px] font-bold"></div>
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">篩選師傅</label><select id="filterMasseur" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-slate-50 border rounded text-[10px] font-bold"><option value="all">所有師傅</option></select></div>
        <div><label class="block text-[8px] font-bold text-slate-400 mb-0.5 uppercase">狀態篩選</label><select id="filterStatus" onchange="filterData()" class="w-full px-1.5 py-0.5 bg-blue-50 border border-blue-100 rounded text-[10px] font-black text-blue-700">
            <option value="all">全部數據</option>
            <option value="critical">異常待處理</option>
        </select></div>
        <button onclick="resetFilters()" class="bg-slate-800 text-white font-black py-1 rounded text-[10px] hover:bg-slate-700 cursor-pointer">重置篩選</button>
    </section>

    <div class="flex gap-1.5 mb-1.5 no-print">
        <div class="bg-white px-3 py-1 rounded-xl shadow-sm border flex flex-col justify-center min-w-[80px]">
            <p class="text-slate-400 text-[8px] font-bold uppercase leading-none mb-1">本期總量</p>
            <div class="flex items-center gap-2">
                <h3 id="statTotal" class="text-lg font-black italic text-blue-600 leading-none">0</h3>
                <div id="loadingSpin" class="animate-spin text-blue-600 text-[8px]">⌛</div>
            </div>
        </div>
        <div id="alarmCountBox" class="bg-white px-3 py-1 rounded-xl shadow-sm border-2 border-red-50 flex flex-col justify-center min-w-[80px]">
            <p class="text-slate-400 text-[8px] font-bold uppercase leading-none mb-1 text-red-400">異常待處置</p>
            <h3 id="activeAlarmNum" class="text-lg font-black italic text-red-500 leading-none">0</h3>
        </div>
        <div class="bg-white px-3 py-1 rounded-xl shadow-sm border flex-1 flex flex-col justify-center overflow-hidden">
            <p class="text-slate-400 text-[8px] font-bold uppercase leading-none mb-1">表現統計 (★ / 📝)</p>
            <div id="masseurStatsList" class="flex gap-1.5 overflow-x-auto custom-scroll pb-0.5 items-center"></div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1550px] compact-table">
                <thead>
                    <tr class="text-[7.5px] font-black text-slate-400 uppercase border-b bg-slate-50/50">
                        <th class="w-6 text-center">序</th>
                        <th class="w-16">系統/服務時間</th>
                        <th class="w-10 text-center">師傅</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q1 介紹</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q2 力道</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q3 異味</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q4 時間</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q5 禮貌</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q6 觸碰</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q7 禁動</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q8 打卡</th>
                        <th class="q-col text-green-700 bg-green-50/20">Q9 名片</th>
                        <th class="q-col text-red-700 bg-red-50/20">Q10 老點</th>
                        <th class="w-20">顧客資訊</th>
                        <th class="w-14 text-center">行銷反饋</th>
                        <th class="w-10 text-center">狀態</th>
                        <th class="min-w-[120px]">管理備註</th>
                        <th class="w-10 no-print text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody" class="text-[8.5px] divide-y"></tbody>
            </table>
        </div>
    </div>

    <!-- 詳情 Modal -->
    <div id="detailModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm modal-inactive z-[10010] items-center justify-center p-4 transition-all duration-300 no-print">
        <div class="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-white">
                <h3 class="text-lg font-black italic text-slate-800"><span id="modalId" class="bg-blue-600 text-white px-2 py-0.5 rounded text-xs mr-2 not-italic">00</span>數據管理</h3>
                <button onclick="closeModal()" class="w-8 h-8 bg-slate-100 rounded-full font-bold hover:bg-slate-200 cursor-pointer">✕</button>
            </div>
            <div id="modalContent" class="p-5 space-y-2.5 overflow-y-auto flex-1"></div>
            <div class="p-5 bg-slate-50 border-t space-y-2.5">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">管理者處置說明</p>
                <textarea id="adminRemarkInput" rows="2" placeholder="請填寫處理情況..." class="w-full p-3 border rounded-xl text-sm outline-none bg-white focus:border-blue-500"></textarea>
                <div class="flex gap-2">
                    <button id="resolveBtn" class="flex-1 bg-blue-600 text-white font-black py-3 rounded-xl shadow-md active:scale-95 transition hover:bg-blue-700 cursor-pointer">標記處理完成</button>
                    <button onclick="closeModal()" class="px-4 bg-slate-200 text-slate-600 font-bold rounded-xl cursor-pointer hover:bg-slate-300">取消</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCuytMbR0wfPk0vChxqI66Zci0uJtGiizE",
        authDomain: "survey-c3aa5.firebaseapp.com",
        projectId: "survey-c3aa5",
        storageBucket: "survey-c3aa5.firebasestorage.app",
        messagingSenderId: "874594469122",
        appId: "1:874594469122:web:2b2c1208b20d2095b9ae1b"
    };

    const LINE_TOKEN = "3xOIikFhaoPH8SvxdK5sS5Vm9HgD/wwrrcFiykH/mqcUCs+N4B5zK0TNypaixr/J1EiiSnrzjvJmvQ/qBUVYxKPGDEngRyhxXatbOJEq7G+ZYV72vvDfZumzExzyI9F/FJSeaKq0QWDaO+mcTO0m2QdB04t89/1O/w1cDnyilFU=";
    const ADMIN_LINE_ID = "Ud66e408ec2d88825f9b4c7be44031f08"; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const collectionPath = ['apps', 'zhongqing-v1', 'surveys'];

    let rawData = [];
    let notifiedIds = new Set(); 
    let syncStarted = false;
    let revealedIds = new Set();
    let currentDocId = null;

    const negKeywords = ["完全沒問", "完全不問", "味道很重", "感覺很差", "言語不當", "非常危險", "完全沒說", "沒有給名片", "絕對不會"];
    const labels = { q1: "Q1. 開始介紹", q2: "Q2. 力道調整", q3: "Q3. 異味/煙味", q4: "Q4. 時間掌握", q5: "Q5. 服務禮貌", q6: "Q6. 肢體觸碰", q7: "Q7. 禁止動作", q8: "Q8. 打卡推廣", q9: "Q9. 提供名片", q10: "Q10. 老點意願" };

    const maskName = (n) => !n ? '-' : (n.length<=1 ? n : (n.length===2 ? n[0]+'*' : n[0]+'*'.repeat(n.length-2)+n[n.length-1]));
    const maskPhone = (p) => !p ? '' : String(p).replace(/\s/g, '').substring(0,3)+'****'+String(p).slice(-3);

    /**
     * 診斷日誌：協助本地排除連線問題
     */
    function logToUI(msg) {
        const logBox = document.getElementById('debugLog');
        const logContent = document.getElementById('logContent');
        if (logBox && logContent) {
            logBox.classList.remove('hidden');
            const entry = document.createElement('div');
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContent.prepend(entry);
            if (logContent.children.length > 5) logContent.removeChild(logContent.lastChild);
        }
    }

    /**
     * 強化版 LINE 發送邏輯 (具備本地端連線應對策略)
     */
    async function sendLineAlertFE(item) {
        if (notifiedIds.has(item.id)) return;
        notifiedIds.add(item.id);
        
        logToUI(`偵測異常 (#${item.masseurId})，準備發送通知...`);

        const url = "https://api.line.me/v2/bot/message/push";
        const payload = {
            to: ADMIN_LINE_ID,
            messages: [{
                type: "text",
                text: `⚠️ 【中清行館】稽核異常！\n────────────────\n師傅：${item.masseurId} 號\n顧客：${item.customerName}\n時間：${item.serviceDate || '未註明'}\n────────────────\n內容：${item.suggestions || '無'}`
            }]
        };

        try {
            // 在本機執行時，若無 CORS 插件，此 fetch 必定失敗
            const response = await fetch(url, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${LINE_TOKEN}` 
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                logToUI("✅ LINE 推播發送成功！");
                updateLineTag("SENT", "bg-green-50 text-green-600");
            } else {
                const err = await response.json();
                logToUI(`❌ API 錯誤: ${err.message || '拒絕請求'}`);
                updateLineTag("API ERROR", "bg-orange-50 text-orange-600");
            }
        } catch (e) {
            logToUI(`🚨 連線攔截: 請確認 Chrome 的 Allow-CORS 插件是否已開啟。`);
            updateLineTag("CORS BLOCKED", "bg-red-50 text-red-600");
        }
    }

    function updateLineTag(text, cls) {
        const tag = document.getElementById('lineStatusTag');
        if (tag) {
            tag.innerText = `LINE: ${text}`;
            tag.className = `${cls} text-[8px] px-2 py-0.5 rounded border font-black italic`;
            setTimeout(() => {
                tag.innerText = "LINE: ACTIVE";
                tag.className = "bg-blue-50 text-blue-600 text-[8px] px-2 py-0.5 rounded border border-blue-200 font-black italic";
            }, 10000);
        }
    }

    window.handleLogin = async () => { 
        const loginBtn = document.getElementById('loginBtn');
        const pass = document.getElementById('loginInput').value;
        if(pass === 'admin888') { 
            loginBtn.disabled = true;
            try {
                sessionStorage.setItem('adminVerified', 'true');
                await signInAnonymously(auth); 
                hideLoginUI();
            } catch (err) { alert("驗證錯誤: " + err.message); loginBtn.disabled = false; }
        } else { alert("密碼錯誤"); }
    };

    function hideLoginUI() {
        const overlay = document.getElementById('loginOverlay');
        if (overlay) {
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                startSync(); 
            }, 500);
        }
    }

    onAuthStateChanged(auth, (user) => { 
        if(user && sessionStorage.getItem('adminVerified') === 'true') {
            document.getElementById('connTag').innerText = "LIVE";
            document.getElementById('connTag').className = "text-[8px] bg-green-100 text-green-600 px-1 py-0.5 rounded font-black";
            hideLoginUI();
        }
    });

    window.signOutAdmin = async () => {
        sessionStorage.removeItem('adminVerified');
        await signOut(auth);
        location.reload();
    };

    function startSync() {
        if (syncStarted) return;
        syncStarted = true;
        onSnapshot(collection(db, ...collectionPath), (sn) => {
            const snData = sn.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            sn.docChanges().forEach(change => {
                if (change.type === "added") {
                    const item = { id: change.doc.id, ...change.doc.data() };
                    const isCritical = Object.values(item.ratings || {}).some(v => negKeywords.includes(v));
                    const now = Date.now();
                    const createTime = item.createdAt ? item.createdAt.seconds * 1000 : now;
                    if (isCritical && item.adminStatus !== 'resolved' && (now - createTime < 600000)) {
                        sendLineAlertFE(item);
                    }
                }
            });
            rawData = snData;
            updateDropdown(); 
            filterData();
            const spin = document.getElementById('loadingSpin');
            if (spin) spin.classList.add('hidden');
        });
    }

    window.showDetail = (docId, seq) => {
        // 使用 String 確保 ID 匹配
        const item = rawData.find(d => String(d.id) === String(docId));
        if(!item) return;
        
        currentDocId = docId;
        document.getElementById('modalId').innerText = seq;
        document.getElementById('adminRemarkInput').value = item.adminRemark || "";
        
        const r = item.ratings || {};
        const isRevealed = revealedIds.has(docId);
        
        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-50 p-3 rounded-xl border"><p class="text-[8px] text-slate-400 font-black mb-0.5">師傅 ID</p><p class="text-xl font-black text-blue-600">${item.masseurId}</p></div>
                <div class="bg-slate-50 p-3 rounded-xl border">
                    <p class="text-[8px] text-slate-400 font-black mb-0.5 uppercase">顧客資訊</p>
                    <p class="text-lg font-bold">${isRevealed ? item.customerName : maskName(item.customerName)}</p>
                    <p class="text-[10px] text-slate-400">${isRevealed ? item.customerPhone : maskPhone(item.customerPhone)}</p>
                </div>
            </div>
            <div class="space-y-1 mt-2">${Object.keys(labels).map(k => `
                <div class="flex justify-between items-center px-3 py-1.5 border rounded-lg ${negKeywords.includes(r[k]) ? 'bg-red-50 border-red-200' : 'bg-white'}">
                    <span class="text-slate-500 font-bold text-[10px]">${labels[k]}</span>
                    <span class="font-black text-[10px] ${negKeywords.includes(r[k]) ? 'text-red-600' : 'text-blue-600'}">${r[k] || '-'}</span>
                </div>`).join('')}</div>
            <div class="bg-amber-50 p-3 rounded-xl border border-amber-100 mt-2">
                <p class="text-[8px] font-black text-amber-600 mb-0.5">建議回饋</p>
                <p class="text-xs text-slate-700 italic">"${item.suggestions || "無建議。"}"</p>
            </div>`;
        
        const modal = document.getElementById('detailModal');
        modal.classList.remove('modal-inactive');
        modal.classList.add('modal-active');
    };

    window.closeModal = () => {
        const modal = document.getElementById('detailModal');
        modal.classList.remove('modal-active');
        modal.classList.add('modal-inactive');
        currentDocId = null;
    };

    window.toggleReveal = (id) => {
        revealedIds.has(id) ? revealedIds.delete(id) : revealedIds.add(id);
        filterData();
    };

    window.filterData = () => {
        const start = document.getElementById('filterStart').value;
        const end = document.getElementById('filterEnd').value;
        const mas = document.getElementById('filterMasseur').value;
        const status = document.getElementById('filterStatus').value;

        let filtered = rawData.filter(d => {
            const date = d.serviceDate || (d.createdAt ? new Date(d.createdAt.seconds*1000).toISOString().split('T')[0] : '');
            const matchTime = (!start || date >= start) && (!end || date <= end);
            const matchMas = (mas === 'all' || String(d.masseurId) === mas);
            const isCritical = Object.values(d.ratings || {}).some(v => negKeywords.includes(v));
            const isRes = d.adminStatus === 'resolved';
            if (status === 'critical') return matchTime && matchMas && isCritical && !isRes;
            return matchTime && matchMas;
        }).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        updateMasseurStats(filtered);
        updateAlarmUI(filtered); 
        renderTable(filtered);
    };

    function updateMasseurStats(data) {
        const stats = {};
        data.forEach(d => {
            if(!stats[d.masseurId]) stats[d.masseurId] = { s:0, f:0 };
            if(d.marketingAction==='Reviewed') stats[d.masseurId].s++;
            if(d.suggestions && d.suggestions.length > 3) stats[d.masseurId].f++;
        });
        const list = document.getElementById('masseurStatsList');
        if (list) {
            list.innerHTML = Object.entries(stats).map(([id, s]) => `
                <div class="flex items-center gap-1 bg-blue-50 border border-blue-100 px-2 py-0.5 rounded-full shrink-0">
                    <span class="text-[9px] font-black text-blue-800 italic">#${id}</span>
                    <span class="text-[10px] font-black text-amber-600">${s.s}★</span>
                    <span class="text-[10px] font-black text-blue-500">${s.f}📝</span>
                </div>`).join('');
        }
    }

    function updateAlarmUI(data) {
        const pending = data.filter(d => Object.values(d.ratings || {}).some(v => negKeywords.includes(v)) && d.adminStatus !== 'resolved');
        document.getElementById('activeAlarmNum').innerText = pending.length;
        const container = document.getElementById('alarmContainer');
        if (pending.length > 0) {
            const d = pending[0];
            container.innerHTML = `
                <div class="m-2 pointer-events-auto">
                    <div class="alarm-banner text-white px-4 py-1.5 rounded-xl flex justify-between items-center shadow-lg">
                        <div class="flex items-center gap-2">
                            <span class="text-base">⚠️</span>
                            <div><p class="font-black text-[11px]">師傅 ${d.masseurId} 稽核異常！</p><p class="text-[8px] opacity-90">${maskName(d.customerName)} | 24H 即時監控中</p></div>
                        </div>
                        <button onclick="window.showDetail('${d.id}', 'ALERT')" class="bg-white text-red-600 px-2 py-0.5 rounded-lg font-black text-[9px] shadow-sm cursor-pointer hover:bg-slate-100">管理處理</button>
                    </div>
                </div>`;
        } else { container.innerHTML = ''; }
    }

    function renderTable(data) {
        document.getElementById('statTotal').innerText = data.length;
        document.getElementById('reportTableBody').innerHTML = data.map((d, i) => {
            const r = d.ratings || {};
            const isCritical = Object.values(r).some(v => negKeywords.includes(v));
            const isResolved = d.adminStatus === 'resolved';
            const isRevealed = revealedIds.has(d.id);
            const ts = d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleString('zh-TW',{hour12:false,month:'numeric',day:'numeric',hour:'numeric',minute:'numeric'}) : 'Sync';
            return `<tr>
                <td class="text-center font-black text-slate-300">${i+1}</td>
                <td class="font-mono text-[6.5px] text-slate-400">系:${ts}<br>服:${d.serviceDate || '-'}</td>
                <td class="text-center"><span class="bg-slate-800 text-white px-1 py-0.5 rounded text-[9px] font-black italic">${d.masseurId}</span></td>
                ${Object.keys(labels).map(k => {
                    const v = r[k] || '-';
                    const color = negKeywords.includes(v) ? 'text-red-700 bg-red-50 font-black' : (v==='-' ? 'text-slate-200' : 'text-slate-600');
                    return `<td class="q-col ${color}">${v}</td>`;
                }).join('')}
                <td class="p-1">
                    <div class="flex items-center gap-1">
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-slate-700 leading-none truncate">${isRevealed ? d.customerName : maskName(d.customerName)}</p>
                            <p class="text-[7px] text-slate-400 leading-tight">${isRevealed ? d.customerPhone : maskPhone(d.customerPhone)}</p>
                        </div>
                        <button onclick="window.toggleReveal('${d.id}')" class="no-print p-0.5 cursor-pointer">${isRevealed ? '👁️‍🗨️' : '👁️'}</button>
                    </div>
                </td>
                <td class="text-center text-[7px]">${d.marketingAction==='Reviewed'?'<span class="text-amber-500 font-bold">★ 評論</span>':'-'}</td>
                <td class="text-center"><span class="text-[6.5px] px-1 py-0.5 rounded-full font-black text-white ${isResolved?'bg-blue-600':(isCritical?'bg-red-600 animate-pulse':'bg-green-600')}">${isResolved?'完成':(isCritical?'異常':'正常')}</span></td>
                <td class="italic text-slate-500 truncate text-[7.5px]">${d.adminRemark || '待處置...'}</td>
                <td class="no-print text-center"><button onclick="window.showDetail('${d.id}', ${i+1})" class="bg-slate-100 text-slate-800 px-1.5 py-0.5 rounded text-[7.5px] font-black hover:bg-blue-600 hover:text-white cursor-pointer transition">管理</button></td>
            </tr>`;
        }).join('');
    }

    document.getElementById('resolveBtn').onclick = async () => {
        if(!currentDocId) return;
        const btn = document.getElementById('resolveBtn'); btn.disabled = true;
        try {
            await updateDoc(doc(db, ...collectionPath, currentDocId), { 
                adminStatus: 'resolved', 
                adminRemark: document.getElementById('adminRemarkInput').value || "已處理。", 
                handledAt: serverTimestamp() 
            });
            closeModal();
        } catch (e) { alert("更新失敗"); } finally { btn.disabled = false; }
    };

    window.updateDropdown = () => {
        const ids = [...new Set(rawData.map(d => String(d.masseurId)))].sort((a,b) => parseInt(a)-parseInt(b));
        const select = document.getElementById('filterMasseur');
        if (select) select.innerHTML = '<option value="all">所有師傅</option>' + ids.map(id => `<option value="${id}">${id}</option>`).join('');
    };
    window.resetFilters = () => { 
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('filterStart').value = today; document.getElementById('filterEnd').value = today;
        document.getElementById('filterMasseur').value = 'all'; document.getElementById('filterStatus').value = 'all'; filterData();
    };
    window.exportReport = () => window.print();

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('filterStart').value = today; document.getElementById('filterEnd').value = today;
        document.getElementById('loginInput').addEventListener('keypress', (e) => e.key === 'Enter' && handleLogin());
        const saved = localStorage.getItem('notifiedIds');
        if(saved) notifiedIds = new Set(JSON.parse(saved));
    };
    window.onbeforeunload = () => { localStorage.setItem('notifiedIds', JSON.stringify([...notifiedIds])); };
</script>
</body>
</html>
